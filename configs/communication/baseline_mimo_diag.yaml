# Hard CIFAR baseline with diagonal MIMO channel and importance-aware stream allocation.
name: baseline_mimo_diag
eval:
  snr_sweep: [-5, 0, 10, 20]

channel:
  _target_: comm.comm_module_wrapper.CommModuleWrapper
  input_dim: 192
  config:
    comm: ${communication.comm}


comm:
  enabled: true
  bottleneck:
    enabled: true
    out_dim: 128
  channel:
    enabled: true
    type: "mimo"
    n_tx: 4
    n_rx: 4
    fading: "diagonal"
    equalizer: "mmse"
    sample_mode: "per_sample"
    diagonal:
      gains: [1.0, 0.8, 0.5, 0.3]
      random:
        enabled: false
        distribution: "uniform"
        min_gain: 0.2
        max_gain: 1.0
        seed: 0
    stream_alloc:
      enabled: true
      strategy: "importance_to_gain"
      assignment:
        enabled: true
        granularity: "token"
        chunk_size: 1
      power:
        enabled: true
        alpha: 1.0
        eps: 1.0e-4
    snr_db: [0, 20]
    train_mode: "sampled"
    normalize: true
    normalization_mode: "sample"
    power_alloc:
      enabled: true
      source: "selection_scores"
      alpha: 1.0
      eps: 1.0e-4
      apply_to_cls: false