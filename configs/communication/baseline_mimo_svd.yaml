# Hard CIFAR baseline with Rayleigh MIMO channel and SVD mode allocation.
name: baseline_mimo_svd
eval:
  snr_sweep: [-5,0, 10, 20]

channel:
  _target_: comm.comm_module_wrapper.CommModuleWrapper
  input_dim: 192
  config:
    comm: ${communication.comm}


comm:
  enabled: true
  bottleneck:
    enabled: false
    out_dim: 128
  channel:
    enabled: true
    type: "mimo"
    n_tx: 4
    n_rx: 4
    fading: "rayleigh"
    equalizer: "mmse"
    snr_db: [-10, 20]
    train_mode: "sampled"
    sample_mode: "per_sample"
    normalize: true
    normalization_mode: "sample"
    mode_alloc:
      enabled: true
      strategy: "importance_to_modes"
      svd:
        per_sample: true
        eps: 1.0e-6
      assignment:
        enabled: true
        granularity: "token"
        chunk_size: 1
        prioritize_cls: true
      power:
        enabled: true
        alpha: 1.0
        eps: 1.0e-4
      num_modes: null
    power_alloc:
      enabled: false
      source: "selection_scores"
      alpha: 1.0
      eps: 1.0e-4
      apply_to_cls: false
