train:
  _target_: torchvision.datasets.Flowers102
  split: train
  transform:
    _target_: torchvision.transforms.Compose
    _recursive_: true
    transforms:
      - _target_: torchvision.transforms.RandAugment
        num_ops: 2
        magnitude: 9
      - _target_: torchvision.transforms.ColorJitter
        brightness: 0.4     
        contrast:   0.4
        saturation: 0.4
        hue:        0
      - _target_: torchvision.transforms.Resize
        size: [224, 224]
      - _target_: torchvision.transforms.RandomHorizontalFlip
      - _target_: torchvision.transforms.ToTensor
      - _target_: torchvision.transforms.Normalize
        mean: [ 0.485, 0.456, 0.406 ]
        std: [ 0.229, 0.224, 0.225 ]
  root: ${core.dataset_path}
  download: true

test:
  _target_: torchvision.datasets.Flowers102
  split: val
  transform:
    _target_: torchvision.transforms.Compose
    _recursive_: true
    transforms:
      - _target_: torchvision.transforms.Resize
        size: [224, 224]
      - _target_: torchvision.transforms.ToTensor
      - _target_: torchvision.transforms.Normalize
        mean: [ 0.485, 0.456, 0.406 ]
        std: [ 0.229, 0.224, 0.225 ]
  root: ${core.dataset_path}
  download: true
  
name : flowers-102
num_classes : 102 
batch_size : 128
# Criterion for selecting the "best" model
# Options: "average" (mean across SNR sweep), "last" (last completed epoch), 
#          "max_noise" (accuracy at lowest SNR), "min_noise" (accuracy at highest SNR),
#          "snr_index" (accuracy at specific index in snr_sweep)
selection_criterion: average 
selection_snr_index: 0 # Only used if selection_criterion is "snr_index"