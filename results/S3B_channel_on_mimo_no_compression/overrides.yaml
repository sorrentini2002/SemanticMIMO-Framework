- method=base
- communication=baseline_mimo_svd
- dataset=cifar_100
- model=deit_tiny_patch16_224
- optimizer=adam
- hyperparameters.split_index=3
- hyperparameters.experiment_name=S3B_channel_on_mimo_no_compression
- dataset.train.download=True
- dataset.test.download=True
- ++core.dataset_path=/kaggle/working/data
- communication.comm.bottleneck.enabled=false
- communication.comm.channel.enabled=true
- communication.comm.channel.n_tx=4
- communication.comm.channel.n_rx=4
- communication.comm.channel.fading=rayleigh
- communication.comm.channel.equalizer=mmse
- communication.comm.channel.power_alloc.enabled=false
- communication.comm.channel.mode_alloc.enabled=false
