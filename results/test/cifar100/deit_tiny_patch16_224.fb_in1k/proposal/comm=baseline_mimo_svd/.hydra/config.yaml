communication:
  name: baseline_mimo_svd
  eval:
    snr_sweep:
    - -5
    - 0
    - 10
    - 20
  channel:
    _target_: comm.comm_module_wrapper.CommModuleWrapper
    input_dim: 192
    config:
      comm: ${communication.comm}
  comm:
    enabled: true
    bottleneck:
      enabled: true
      out_dim: 128
    channel:
      enabled: true
      type: mimo
      n_tx: 4
      n_rx: 4
      fading: rayleigh
      equalizer: mmse
      snr_db:
      - 0
      - 20
      train_mode: sampled
      sample_mode: per_sample
      normalize: true
      normalization_mode: sample
      mode_alloc:
        enabled: true
        strategy: importance_to_modes
        svd:
          per_sample: true
          eps: 1.0e-06
        assignment:
          enabled: true
          granularity: token
          chunk_size: 1
          prioritize_cls: true
        power:
          enabled: true
          alpha: 1.0
          eps: 0.0001
        num_modes: null
      power_alloc:
        enabled: true
        source: selection_scores
        alpha: 1.0
        eps: 0.0001
        apply_to_cls: false
dataset:
  train:
    _target_: torchvision.datasets.CIFAR100
    train: true
    transform:
      _target_: torchvision.transforms.Compose
      _recursive_: true
      transforms:
      - _target_: torchvision.transforms.RandAugment
        num_ops: 2
        magnitude: 9
      - _target_: torchvision.transforms.ColorJitter
        brightness: 0.4
        contrast: 0.4
        saturation: 0.4
        hue: 0
      - _target_: torchvision.transforms.Resize
        size:
        - 224
        - 224
      - _target_: torchvision.transforms.RandomHorizontalFlip
      - _target_: torchvision.transforms.ToTensor
      - _target_: torchvision.transforms.Normalize
        mean:
        - 0.485
        - 0.456
        - 0.406
        std:
        - 0.229
        - 0.224
        - 0.225
    root: ${core.dataset_path}
    download: true
  test:
    _target_: torchvision.datasets.CIFAR100
    train: false
    transform:
      _target_: torchvision.transforms.Compose
      _recursive_: true
      transforms:
      - _target_: torchvision.transforms.Resize
        size:
        - 224
        - 224
      - _target_: torchvision.transforms.ToTensor
      - _target_: torchvision.transforms.Normalize
        mean:
        - 0.485
        - 0.456
        - 0.406
        std:
        - 0.229
        - 0.224
        - 0.225
    root: ${core.dataset_path}
    download: true
  name: cifar100
  num_classes: 100
  batch_size: 128
  max_communication: 75000
  selection_criterion: average
  selection_snr_index: 0
model:
  _target_: timm.create_model
  model_name: deit_tiny_patch16_224.fb_in1k
  pretrained: true
  num_classes: ${dataset.num_classes}
optimizer:
  _target_: torch.optim.Adam
  lr: 0.0001
  eps: 1.0e-08
  weight_decay: 0
method:
  model:
    _target_: methods.proposal.model
    desired_compression: ${..parameters.desired_compression}
    token_compression: ${..parameters.token_compression}
    batch_compression: ${..parameters.batch_compression}
    pooling: ${..parameters.pooling}
  name: proposal
  parameters:
    desired_compression: 0.1
    token_compression: null
    batch_compression: null
    pooling: attention
hyperparameters:
  split_index: 3
  experiment_name: test
  seeds:
  - 42
core:
  dataset_path: /kaggle/working/data
  results_path: ./results
  plots_path: ./plots
