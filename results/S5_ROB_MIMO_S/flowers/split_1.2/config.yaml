communication:
  name: baseline_mimo_svd
  eval:
    snr_sweep:
    - -5
    - 0
    - 10
    - 20
  channel:
    _target_: comm.comm_module_wrapper.CommModuleWrapper
    input_dim: 192
    config:
      comm: ${communication.comm}
  comm:
    enabled: true
    bottleneck:
      enabled: false
      out_dim: 128
    channel:
      enabled: true
      type: mimo
      n_tx: 4
      n_rx: 4
      fading: rayleigh
      equalizer: mmse
      snr_db:
      - -10
      - 20
      train_mode: sampled
      sample_mode: per_sample
      normalize: true
      normalization_mode: sample
      mode_alloc:
        enabled: true
        strategy: importance_to_modes
        svd:
          per_sample: true
          eps: 1.0e-06
        assignment:
          enabled: true
          granularity: token
          chunk_size: 1
          prioritize_cls: true
        power:
          enabled: true
          alpha: 1.0
          eps: 0.0001
        num_modes: null
      power_alloc:
        enabled: false
        source: selection_scores
        alpha: 1.0
        eps: 0.0001
        apply_to_cls: false
dataset:
  train:
    _target_: torchvision.datasets.Flowers102
    split: test
    transform:
      _target_: torchvision.transforms.Compose
      _recursive_: true
      transforms:
      - _target_: torchvision.transforms.RandAugment
        num_ops: 2
        magnitude: 9
      - _target_: torchvision.transforms.ColorJitter
        brightness: 0.4
        contrast: 0.4
        saturation: 0.4
        hue: 0
      - _target_: torchvision.transforms.Resize
        size:
        - 224
        - 224
      - _target_: torchvision.transforms.RandomHorizontalFlip
      - _target_: torchvision.transforms.ToTensor
      - _target_: torchvision.transforms.Normalize
        mean:
        - 0.485
        - 0.456
        - 0.406
        std:
        - 0.229
        - 0.224
        - 0.225
    root: ${core.dataset_path}
    download: true
  test:
    _target_: torchvision.datasets.Flowers102
    split: train
    transform:
      _target_: torchvision.transforms.Compose
      _recursive_: true
      transforms:
      - _target_: torchvision.transforms.Resize
        size:
        - 224
        - 224
      - _target_: torchvision.transforms.ToTensor
      - _target_: torchvision.transforms.Normalize
        mean:
        - 0.485
        - 0.456
        - 0.406
        std:
        - 0.229
        - 0.224
        - 0.225
    root: ${core.dataset_path}
    download: true
  name: flowers-102
  num_classes: 102
  batch_size: 128
  num_epochs: 30
  num_workers: 2
  selection_criterion: average
  selection_snr_index: 0
model:
  _target_: timm.create_model
  model_name: deit_tiny_patch16_224.fb_in1k
  pretrained: true
  num_classes: ${dataset.num_classes}
optimizer:
  _target_: torch.optim.AdamW
  lr: 0.0003
  eps: 1.0e-08
  weight_decay: 0.05
method:
  model:
    _target_: methods.gumbel_method.model
    method_cfg: ${method.parameters}
  name: gumbel
  parameters:
    desired_compression: 0.1582
    token_compression: null
    compression_enabled: true
    channel_eval_only: false
    semantic_waterfilling: true
    tau_start: 1.8
    tau_end: 1.05
    schedule: cosine
    steps: 10000
    hard: true
    straight_through: true
    gamma_init: 1.5
    beta_init: 1.0
    gate_init: -2.0
    logit_scale_start: 0.4
    logit_scale_end: 0.65
    logit_scale_mode: cosine
    entropy_bottleneck_enabled: true
    entropy_target_start: 5.2
    entropy_target_end: 3.5
    entropy_bottleneck_weight: 0.15
    stability_bonus_enabled: false
    stability_bonus_ema_decay: 0.97
    stability_bonus_weight: 0.3
    entropy_reg_enabled: true
    entropy_reg_weight: 0.02
    cov_reg_enabled: false
    cov_reg_weight: 0.2
    cov_reg_margin: 0.3
    cov_reg_max_tokens: 64
    eval_k: 20
    gumbel_mc_enabled: true
    gumbel_mc_samples: 16
    gumbel_mc_tau: 0.3
    gumbel_mc_aggregate: mean
    diversify_enabled: false
    diversify_lambda: 0.2
    diversify_metric: cosine
hyperparameters:
  split_index: 1
  experiment_name: Mimo_Gumbel_Layer1_Compr_32
  seeds:
  - 42
core:
  dataset_path: /kaggle/working/data
  results_path: ./results
  plots_path: ./plots
