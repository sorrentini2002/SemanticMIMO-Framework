- method=gumbel_eval_channel
- communication=baseline_mimo_svd
- dataset=cifar_100
- model=deit_tiny_patch16_224
- optimizer=adam
- hyperparameters.split_index=3
- hyperparameters.experiment_name=S4B_channel_on_bottleneck_on_token_selection_on
- dataset.train.download=True
- dataset.test.download=True
- ++core.dataset_path=/kaggle/working/data
- communication.comm.bottleneck.enabled=true
- communication.comm.bottleneck.out_dim=128
- communication.comm.channel.enabled=true
- communication.comm.channel.n_tx=4
- communication.comm.channel.n_rx=4
- communication.comm.channel.fading=rayleigh
- communication.comm.channel.equalizer=mmse
- method.parameters.channel_eval_only=false
- method.parameters.compression_enabled=true
- method.parameters.desired_compression=0.1
- method.parameters.semantic_waterfilling=true
