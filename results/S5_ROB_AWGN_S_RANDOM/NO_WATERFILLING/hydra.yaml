hydra:
  run:
    dir: ${core.results_path}/${hyperparameters.experiment_name}/${dataset.name}/${model.model_name}/${method.name}/comm=${communication.name}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - method=random
    - communication=baseline_mimo
    - dataset=cifar_100
    - model=deit_tiny_patch16_224
    - optimizer=adam
    - hyperparameters.split_index=3
    - hyperparameters.experiment_name=Random_awgn_S_NOwf
    - dataset.train.download=True
    - dataset.test.download=True
    - ++core.dataset_path=/kaggle/working/data
    - communication.comm.bottleneck.enabled=false
    - communication.comm.channel.enabled=true
    - communication.comm.channel.fading=identity
    - communication.comm.channel.equalizer=mmse
    - communication.comm.channel.n_tx=1
    - communication.comm.channel.n_rx=1
    - communication.comm.channel.power_alloc.enabled=true
    - method.parameters.channel_eval_only=false
    - method.parameters.compression_enabled=true
    - method.parameters.desired_compression=0.1
    - method.parameters.semantic_waterfilling=false
  job:
    name: main
    chdir: false
    override_dirname: ++core.dataset_path=/kaggle/working/data,communication.comm.bottleneck.enabled=false,communication.comm.channel.enabled=true,communication.comm.channel.equalizer=mmse,communication.comm.channel.fading=identity,communication.comm.channel.n_rx=1,communication.comm.channel.n_tx=1,communication.comm.channel.power_alloc.enabled=true,communication=baseline_mimo,dataset.test.download=True,dataset.train.download=True,dataset=cifar_100,hyperparameters.experiment_name=Random_awgn_S_NOwf,hyperparameters.split_index=3,method.parameters.channel_eval_only=false,method.parameters.compression_enabled=true,method.parameters.desired_compression=0.1,method.parameters.semantic_waterfilling=false,method=random,model=deit_tiny_patch16_224,optimizer=adam
    id: ???
    num: ???
    config_name: default
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.2'
    cwd: /kaggle/working
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /kaggle/working/configs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /kaggle/working/results/Random_awgn_S_NOwf/cifar100/deit_tiny_patch16_224.fb_in1k/random/comm=baseline_mimo
    choices:
      hydra: default
      method: random
      optimizer: adam
      model: deit_tiny_patch16_224
      dataset: cifar_100
      communication: baseline_mimo
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
