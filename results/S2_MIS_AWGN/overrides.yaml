- method=gumbel_eval_channel
- communication=baseline_mimo
- dataset=cifar_100
- model=deit_tiny_patch16_224
- optimizer=adam
- hyperparameters.split_index=3
- hyperparameters.experiment_name=S2A_clean_train_noisy_val_awgn_like
