communication:
  name: clean
  channel:
    _target_: comm.comm_module_wrapper.CommModuleWrapper
    input_dim: 192
    config:
      comm: ${communication.comm}
  comm:
    enabled: true
    bottleneck:
      enabled: false
      out_dim: 128
    channel:
      enabled: true
      snr_db: 100
      fading: identity
dataset:
  train:
    _target_: torchvision.datasets.Flowers102
    split: test
    transform:
      _target_: torchvision.transforms.Compose
      _recursive_: true
      transforms:
      - _target_: torchvision.transforms.RandAugment
        num_ops: 2
        magnitude: 9
      - _target_: torchvision.transforms.ColorJitter
        brightness: 0.4
        contrast: 0.4
        saturation: 0.4
        hue: 0
      - _target_: torchvision.transforms.Resize
        size:
        - 224
        - 224
      - _target_: torchvision.transforms.RandomHorizontalFlip
      - _target_: torchvision.transforms.ToTensor
      - _target_: torchvision.transforms.Normalize
        mean:
        - 0.485
        - 0.456
        - 0.406
        std:
        - 0.229
        - 0.224
        - 0.225
    root: ${core.dataset_path}
    download: true
  test:
    _target_: torchvision.datasets.Flowers102
    split: train
    transform:
      _target_: torchvision.transforms.Compose
      _recursive_: true
      transforms:
      - _target_: torchvision.transforms.Resize
        size:
        - 224
        - 224
      - _target_: torchvision.transforms.ToTensor
      - _target_: torchvision.transforms.Normalize
        mean:
        - 0.485
        - 0.456
        - 0.406
        std:
        - 0.229
        - 0.224
        - 0.225
    root: ${core.dataset_path}
    download: true
  name: flowers-102
  num_classes: 102
  batch_size: 128
  num_epochs: 50
  num_workers: 2
  selection_criterion: average
  selection_snr_index: 0
model:
  _target_: timm.create_model
  model_name: deit_tiny_patch16_224.fb_in1k
  pretrained: true
  num_classes: ${dataset.num_classes}
optimizer:
  _target_: torch.optim.AdamW
  lr: 0.0003
  eps: 1.0e-08
  weight_decay: 0.05
method:
  model:
    _target_: methods.base.model
  name: base
  parameters: {}
hyperparameters:
  split_index: 3
  experiment_name: S1_clean_baseline_flowers
  seeds:
  - 42
core:
  dataset_path: /kaggle/working/data
  results_path: ./results
  plots_path: ./plots
