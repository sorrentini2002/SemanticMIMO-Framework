# MIMO debug profile: identity sanity check (near-noiseless)
name: debug_identity_sanity

channel:
  _target_: comm.comm_module_wrapper.CommModuleWrapper
  input_dim: 192
  config:
    comm: ${communication.comm}

comm:
  enabled: true
  bottleneck:
    enabled: true
    out_dim: 128
  channel:
    enabled: true
    type: "mimo"
    n_tx: 4
    n_rx: 4
    fading: "identity"
    equalizer: "mmse"
    snr_db: [60, 60]
    train_mode: "fixed"
    sample_mode: "per_sample"
    normalize: true
    normalization_mode: "sample"
    power_alloc:
      enabled: false
      source: "selection_scores"
      alpha: 1.0
      eps: 1.0e-4
      apply_to_cls: false
